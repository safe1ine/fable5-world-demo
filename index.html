<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>侏罗纪世界</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #06080a;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #8aa39b;
        font-size: 13px;
        letter-spacing: 0.08em;
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 10;
      }
      #boot .title {
        font-size: 22px;
        color: #c8d8d0;
        margin-bottom: 14px;
        letter-spacing: 0.35em;
      }
      #boot .bar {
        width: 260px;
        height: 2px;
        background: #1a2420;
        margin-top: 16px;
        position: relative;
        overflow: hidden;
      }
      #boot .bar > div {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        background: #5fae8f;
        transition: width 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="boot">
      <div class="title">侏 罗 纪 世 界</div>
      <div id="boot-msg">正在生成史前草原</div>
      <div class="bar"><div id="boot-bar"></div></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
